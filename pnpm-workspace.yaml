packages:
  - "apps/*"
  - "packages/*"
  - "tools"

allowBuilds:
  '@google/genai': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@google/genai"
  - "@prisma/engines"
  - "esbuild"
  - "prisma"
  - "protobufjs"
  - "sharp"
  - "tesseract.js"
  - "unrs-resolver"
